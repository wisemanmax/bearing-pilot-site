  <style>
    :root {
      color-scheme: light;
      --ink-teal: #081a40;
      --sand: #f5eee3;
      --brass: #e3bd5f;
      --serif: "Iowan Old Style", "Palatino Nova", Palatino, "New York", Georgia, serif;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: clamp(1.5rem, 6vw, 4rem);
      display: grid;
      place-items: center;
      color: var(--sand);
      background:
        radial-gradient(circle at 75% 20%, rgba(227, 189, 95, 0.12), transparent 28rem),
        linear-gradient(145deg, #0c2352, var(--ink-teal) 72%);
      font-family: var(--sans);
      line-height: 1.6;
    }

    main {
      width: min(100%, 42rem);
      padding: clamp(2rem, 7vw, 4.5rem);
      border: 1px solid rgba(227, 189, 95, 0.55);
      border-radius: 14px;
      background: rgba(8, 26, 64, 0.72);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.24);
      text-align: center;
    }

    svg {
      width: 5.5rem;
      height: 5.5rem;
      margin-bottom: 1.5rem;
      color: var(--brass);
    }

    .dial, .ticks { fill: none; stroke: currentColor; }
    .dial { opacity: 0.6; }
    .ticks { opacity: 0.82; }
    .needle { fill: var(--brass); }
    .center { fill: var(--ink-teal); stroke: var(--brass); }

    .position {
      margin: 0 0 0.75rem;
      color: var(--brass);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 500;
      letter-spacing: -0.035em;
      line-height: 0.95;
    }

    .explanation {
      max-width: 31rem;
      margin: 1.5rem auto 2rem;
      color: #eee5d7;
      font-size: clamp(1rem, 2vw, 1.15rem);
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.2rem;
      border: 1px solid var(--brass);
      border-radius: 6px;
      color: var(--ink-teal);
      background: var(--brass);
      font-weight: 750;
      text-decoration: none;
    }

    a:hover { background: #e5d9c7; }
    a:focus-visible { outline: 3px solid #f5eee3; outline-offset: 4px; }
  </style>
